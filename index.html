<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEADLIFT.JP｜コーチングプログラム生成</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --iron: #1a1a1a;
    --steel: #2a2a2a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #f0ede8;
    --gray: #888;
    --red: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid #222;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--black);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--gold);
  }

  .logo span { color: var(--white); }

  .header-sub {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gray);
    text-transform: uppercase;
  }

  /* MAIN */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 72px);
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 16px;
  }

  .page-desc {
    font-size: 14px;
    color: var(--gray);
    line-height: 1.8;
    margin-bottom: 56px;
  }

  /* FORM CARD */
  .card {
    background: var(--iron);
    border: 1px solid #2a2a2a;
    border-top: 2px solid var(--gold);
    padding: 36px;
    margin-bottom: 24px;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #2a2a2a;
  }

  /* FORM ELEMENTS */
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .field-row.triple {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .field-row.single {
    grid-template-columns: 1fr;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gray);
    text-transform: uppercase;
  }

  label span.req {
    color: var(--gold);
    margin-left: 4px;
  }

  input, select, textarea {
    background: var(--steel);
    border: 1px solid #333;
    border-bottom: 2px solid #444;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 400;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    border-bottom-color: var(--gold);
  }

  input::placeholder, textarea::placeholder {
    color: #555;
    font-size: 13px;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }

  select option { background: var(--steel); }

  /* RADIO GROUP */
  .radio-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .radio-group input[type="radio"] { display: none; }

  .radio-group label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    background: var(--steel);
    border: 1px solid #333;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--gray);
    transition: all 0.2s;
    text-transform: none;
  }

  .radio-group input[type="radio"]:checked + label {
    background: var(--gold);
    color: var(--black);
    border-color: var(--gold);
    font-weight: 700;
  }

  /* DIVIDER */
  .divider {
    border: none;
    border-top: 1px solid #222;
    margin: 32px 0;
  }

  /* SUBMIT */
  .submit-wrap {
    text-align: center;
    margin-top: 48px;
  }

  .btn-generate {
    background: var(--gold);
    color: var(--black);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 5px;
    padding: 20px 64px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }

  .btn-generate:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
  }

  .btn-generate:disabled {
    background: #444;
    color: #888;
    cursor: not-allowed;
    transform: none;
  }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 60px 0;
  }

  .loading.active { display: block; }

  .loading-bar {
    width: 200px;
    height: 2px;
    background: #222;
    margin: 24px auto;
    overflow: hidden;
  }

  .loading-bar::after {
    content: '';
    display: block;
    height: 100%;
    width: 40%;
    background: var(--gold);
    animation: loading 1.2s ease-in-out infinite;
  }

  @keyframes loading {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  .loading-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--gold);
  }

  /* OUTPUT */
  #output {
    display: none;
    margin-top: 60px;
  }

  #output.active { display: block; }

  .output-header {
    border-bottom: 1px solid #2a2a2a;
    padding-bottom: 32px;
    margin-bottom: 40px;
  }

  .output-content {
    background: var(--iron);
    border: 1px solid #2a2a2a;
    border-top: 2px solid var(--gold);
    padding: 40px;
    font-size: 14px;
    line-height: 2;
    white-space: pre-wrap;
    color: #ddd;
  }

  .output-content h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--gold);
    margin: 32px 0 12px;
    border-bottom: 1px solid #2a2a2a;
    padding-bottom: 8px;
  }

  .output-content h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--white);
    margin: 24px 0 8px;
  }

  .output-content p { margin-bottom: 12px; }

  .output-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0 24px;
    font-size: 13px;
  }

  .output-content th {
    background: var(--steel);
    color: var(--gold);
    font-weight: 700;
    padding: 10px 14px;
    text-align: left;
    border: 1px solid #333;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 14px;
  }

  .output-content td {
    padding: 10px 14px;
    border: 1px solid #2a2a2a;
    vertical-align: top;
  }

  .output-content tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .btn-reset {
    display: inline-block;
    margin-top: 32px;
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 4px;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reset:hover {
    background: var(--gold);
    color: var(--black);
  }

  /* MOBILE */
  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    main { padding: 40px 16px 80px; }
    .card { padding: 24px 20px; }
    .field-row, .field-row.triple { grid-template-columns: 1fr; }
    .output-content { padding: 24px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DEADLIFT<span>.JP</span></div>
  <div class="header-sub">Elite Powerlifting Coaching</div>
</header>

<main>
  <div id="form-section">
    <p class="section-title">Client Assessment</p>
    <h1 class="page-title">カウンセリング<br>シート</h1>
    <p class="page-desc">以下の情報を入力すると、AIがあなた専用の4週間プログラムを自動生成します。<br>正確な情報を入力するほど、精度の高いプログラムになります。</p>

    <!-- 基本情報 -->
    <div class="card">
      <div class="card-title">01｜基本情報</div>
      <div class="field-row">
        <div class="field">
          <label>氏名<span class="req">*</span></label>
          <input type="text" id="name" placeholder="山田 太郎">
        </div>
        <div class="field">
          <label>年齢<span class="req">*</span></label>
          <input type="number" id="age" placeholder="28">
        </div>
      </div>
      <div class="field-row triple">
        <div class="field">
          <label>体重 (kg)<span class="req">*</span></label>
          <input type="number" id="weight" placeholder="83" step="0.1">
        </div>
        <div class="field">
          <label>身長 (cm)</label>
          <input type="number" id="height" placeholder="175">
        </div>
        <div class="field">
          <label>競技歴<span class="req">*</span></label>
          <select id="experience">
            <option value="">選択してください</option>
            <option value="初心者（1年未満）">初心者（1年未満）</option>
            <option value="中級者（1〜3年）">中級者（1〜3年）</option>
            <option value="上級者（3〜5年）">上級者（3〜5年）</option>
            <option value="エリート（5年以上）">エリート（5年以上）</option>
          </select>
        </div>
      </div>
      <div class="field-row single">
        <div class="field">
          <label>職業・生活スタイル</label>
          <input type="text" id="lifestyle" placeholder="例：デスクワーク、立ち仕事、学生など">
        </div>
      </div>
    </div>

    <!-- 現在の記録 -->
    <div class="card">
      <div class="card-title">02｜現在の記録（1RM）</div>
      <div class="field-row triple">
        <div class="field">
          <label>スクワット (kg)<span class="req">*</span></label>
          <input type="number" id="squat" placeholder="140" step="0.5">
        </div>
        <div class="field">
          <label>ベンチプレス (kg)<span class="req">*</span></label>
          <input type="number" id="bench" placeholder="100" step="0.5">
        </div>
        <div class="field">
          <label>デッドリフト (kg)<span class="req">*</span></label>
          <input type="number" id="deadlift" placeholder="180" step="0.5">
        </div>
      </div>
      <div class="field-row single">
        <div class="field">
          <label>フォームの自己評価・弱点</label>
          <textarea id="form_weakness" placeholder="例：スクワットのボトムで前傾しやすい、デッドリフトのロックアウトが弱いなど"></textarea>
        </div>
      </div>
    </div>

    <!-- トレーニング環境 -->
    <div class="card">
      <div class="card-title">03｜トレーニング環境</div>
      <div class="field-row">
        <div class="field">
          <label>週のトレーニング日数<span class="req">*</span></label>
          <div class="radio-group">
            <input type="radio" name="days" id="d2" value="週2日"><label for="d2">2日</label>
            <input type="radio" name="days" id="d3" value="週3日"><label for="d3">3日</label>
            <input type="radio" name="days" id="d4" value="週4日"><label for="d4">4日</label>
            <input type="radio" name="days" id="d5" value="週5日以上"><label for="d5">5日以上</label>
          </div>
        </div>
        <div class="field">
          <label>1回のトレーニング時間</label>
          <div class="radio-group">
            <input type="radio" name="duration" id="t60" value="60分以内"><label for="t60">〜60分</label>
            <input type="radio" name="duration" id="t90" value="90分程度"><label for="t90">90分</label>
            <input type="radio" name="duration" id="t120" value="120分以上"><label for="t120">120分〜</label>
          </div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>使用できる器具・環境</label>
          <select id="equipment">
            <option value="フルスペックのパワーリフティングジム">フルスペックのパワーリフティングジム</option>
            <option value="一般的なジム（スミスマシンあり）">一般的なジム（スミスマシンあり）</option>
            <option value="ホームジム（バーベル・ラック）">ホームジム（バーベル・ラック）</option>
            <option value="器具が限られた環境">器具が限られた環境</option>
          </select>
        </div>
        <div class="field">
          <label>ギア使用</label>
          <div class="radio-group">
            <input type="radio" name="gear" id="raw" value="ローギア（ノーギア）"><label for="raw">ローギア</label>
            <input type="radio" name="gear" id="equipped" value="フルギア"><label for="equipped">フルギア</label>
            <input type="radio" name="gear" id="both" value="両方使用"><label for="both">両方</label>
          </div>
        </div>
      </div>
    </div>

    <!-- 目標・大会 -->
    <div class="card">
      <div class="card-title">04｜目標・大会</div>
      <div class="field-row">
        <div class="field">
          <label>直近の目標<span class="req">*</span></label>
          <select id="goal">
            <option value="">選択してください</option>
            <option value="記録の更新（特定の種目）">記録の更新（特定の種目）</option>
            <option value="大会出場・入賞">大会出場・入賞</option>
            <option value="全国大会出場">全国大会出場</option>
            <option value="世界大会出場">世界大会出場</option>
            <option value="体重コントロール＋記録向上">体重コントロール＋記録向上</option>
          </select>
        </div>
        <div class="field">
          <label>直近の大会予定</label>
          <input type="text" id="competition" placeholder="例：2026年6月 ○○選手権、未定など">
        </div>
      </div>
      <div class="field-row single">
        <div class="field">
          <label>目標記録（具体的に）</label>
          <input type="text" id="target" placeholder="例：スクワット160kg、トータル500kgなど">
        </div>
      </div>
    </div>

    <!-- 身体・コンディション -->
    <div class="card">
      <div class="card-title">05｜身体・コンディション</div>
      <div class="field-row">
        <div class="field">
          <label>現在の怪我・痛みの有無</label>
          <textarea id="injury" placeholder="例：左膝に違和感あり、腰痛の既往歴あり、特になしなど"></textarea>
        </div>
        <div class="field">
          <label>睡眠・回復状況</label>
          <div class="radio-group" style="flex-direction: column; gap: 6px;">
            <input type="radio" name="sleep" id="s_good" value="良好（7時間以上）"><label for="s_good" style="justify-content: flex-start; width: 100%;">良好（7時間以上）</label>
            <input type="radio" name="sleep" id="s_avg" value="普通（5〜7時間）"><label for="s_avg" style="justify-content: flex-start; width: 100%;">普通（5〜7時間）</label>
            <input type="radio" name="sleep" id="s_bad" value="不足（5時間未満）"><label for="s_bad" style="justify-content: flex-start; width: 100%;">不足（5時間未満）</label>
          </div>
        </div>
      </div>
      <div class="field-row single">
        <div class="field">
          <label>栄養・食事について</label>
          <textarea id="nutrition" placeholder="例：プロテイン摂取あり、カロリー管理している、食事が不規則など"></textarea>
        </div>
      </div>
    </div>

    <!-- その他 -->
    <div class="card">
      <div class="card-title">06｜その他・自由記入</div>
      <div class="field-row single">
        <div class="field">
          <label>コーチングに期待すること・特に改善したいこと</label>
          <textarea id="expectations" placeholder="例：デッドリフトを専門的に強化したい、大会に向けてピーキングを学びたい、フォームを根本から見直したいなど" style="min-height: 100px;"></textarea>
        </div>
      </div>
    </div>

    <div class="submit-wrap">
      <button class="btn-generate" onclick="submitForm()">
        <span>▶</span> コーチに送信する
      </button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <p class="loading-text">送信中...</p>
    <div class="loading-bar"></div>
    <p style="font-size: 12px; color: var(--gray); margin-top: 12px; letter-spacing: 2px;">SENDING TO COACH</p>
  </div>

  <!-- 送信完了 -->
  <div id="output" style="display:none;">
    <div style="text-align:center; padding: 80px 24px;">
      <p class="section-title">Complete</p>
      <h2 class="page-title" style="font-size: clamp(36px, 7vw, 64px); margin-bottom: 24px;">送信完了</h2>
      <p style="font-size: 15px; color: var(--gray); line-height: 2; margin-bottom: 48px;">
        カウンセリングシートをコーチに送信しました。<br>
        48時間以内にコーチからご連絡いたします。
      </p>
      <div style="width: 60px; height: 2px; background: var(--gold); margin: 0 auto 48px;"></div>
      <button class="btn-reset" onclick="resetForm()">← 入力画面に戻る</button>
    </div>
  </div>
</main>

<script>
function getRadioValue(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : '未回答';
}

function getValue(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

async function submitForm() {
  // Validation
  const required = ['name','age','weight','squat','bench','deadlift','experience','goal'];
  const labels = {name:'氏名', age:'年齢', weight:'体重', squat:'スクワット', bench:'ベンチプレス', deadlift:'デッドリフト', experience:'競技歴', goal:'目標'};
  for (const id of required) {
    if (!getValue(id)) {
      alert(`「${labels[id]}」を入力してください`);
      document.getElementById(id).focus();
      return;
    }
  }
  if (getRadioValue('days') === '未回答') {
    alert('週のトレーニング日数を選択してください');
    return;
  }

  // データ収集
  const squat = parseInt(getValue('squat')) || 0;
  const bench = parseInt(getValue('bench')) || 0;
  const deadlift = parseInt(getValue('deadlift')) || 0;

  const fields = {
    '氏名': getValue('name'),
    '年齢': getValue('age') + '歳',
    '体重': getValue('weight') + 'kg',
    '身長': (getValue('height') || '未記入') + (getValue('height') ? 'cm' : ''),
    '競技歴': getValue('experience'),
    '生活スタイル': getValue('lifestyle') || '未記入',
    'スクワット1RM': getValue('squat') + 'kg',
    'ベンチプレス1RM': getValue('bench') + 'kg',
    'デッドリフト1RM': getValue('deadlift') + 'kg',
    'トータル': (squat + bench + deadlift) + 'kg',
    'フォームの弱点': getValue('form_weakness') || 'なし',
    '週トレーニング日数': getRadioValue('days'),
    '1回の時間': getRadioValue('duration'),
    'トレーニング環境': getValue('equipment'),
    'ギア': getRadioValue('gear'),
    '目標': getValue('goal'),
    '大会予定': getValue('competition') || '未定',
    '目標記録': getValue('target') || '未記入',
    '怪我・痛み': getValue('injury') || 'なし',
    '睡眠': getRadioValue('sleep'),
    '栄養・食事': getValue('nutrition') || '未記入',
    'コーチングへの期待': getValue('expectations') || '未記入',
  };

  const message = Object.entries(fields)
    .map(([k, v]) => `【${k}】\n${v}`)
    .join('\n\n');

  // ローディング表示
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading').classList.add('active');

  try {
    // formspree.io に登録後、YOUR_FORM_ID を実際のIDに変更してください
    const FORMSPREE_ENDPOINT = 'https://formspree.io/f/maqpovlv';

    const response = await fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        subject: '【DEADLIFT.JP】カウンセリングシート - ' + getValue('name'),
        message: message,
      })
    });

    document.getElementById('loading').classList.remove('active');

    if (response.ok) {
      document.getElementById('output').style.display = 'block';
    } else {
      throw new Error('送信失敗');
    }
  } catch (err) {
    document.getElementById('loading').classList.remove('active');
    document.getElementById('form-section').style.display = 'block';
    alert('送信に失敗しました。\nFormspreeのエンドポイントURLを設定してください。\n（HTMLの YOUR_FORM_ID を変更）');
  }
}

function resetForm() {
  document.getElementById('output').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
